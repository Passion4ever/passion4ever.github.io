# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Passion4ever
subtitle: Goal-Oriented
description: 勿为工具之奴
keywords:
author: ❤️Passion4ever
language: zh-CN
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://passion4ever.github.io
permalink: posts/:uuid/
permalink_defaults:
pretty_urls:
  trailing_index: false # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: false # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: paper
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: 'git'
  repo: 'git@github.com:Passion4ever/passion4ever.github.io.git'
  branch: 'main'





# 以下内容是我自己使用到的配置
theme_config:

  # ---------------------------------------------------------------
  # Theme Core Configuration Settings
  # See: https://theme-next.org/docs/theme-settings/
  # ---------------------------------------------------------------

  # Create your custom files in site directory `source/_data` and uncomment needed files below.
  custom_file_path:
    head: source/_data/head.njk
    header: source/_data/header.njk
    sidebar: source/_data/sidebar.njk
    postMeta: source/_data/post-meta.njk
    postBodyStart: source/_data/post-body-start.njk
    postBodyEnd: source/_data/post-body-end.njk
    footer: source/_data/footer.njk
    bodyEnd: source/_data/body-end.njk
    variable: source/_data/variables.styl
    mixin: source/_data/mixins.styl
    style: source/_data/styles.styl


  # ---------------------------------------------------------------
  # Scheme Settings
  # ---------------------------------------------------------------
  
  # 主题样式
  # scheme: Muse
  # scheme: Mist
  # scheme: Pisces
  scheme: Gemini

  darkmode: false
  # ---------------------------------------------------------------
  # Site Information Settings
  # See: https://theme-next.org/docs/getting-started/
  # ---------------------------------------------------------------
  
  # 图标头像
  favicon:
    small: /images/github_default_16.png
    medium: /images/github_default_32.png
    apple_touch_icon: /images/github_default_180.png
    safari_pinned_tab: /images/logo.svg
    #android_manifest: /images/manifest.json
    #ms_browserconfig: /images/browserconfig.xml
  
  # 许可证
  # Creative Commons 4.0 International License.
  # See: https://creativecommons.org/about/cclicenses/
  creative_commons:
    # Available values: by | by-nc | by-nc-nd | by-nc-sa | by-nd | by-sa | cc-zero
    license: by-nc-sa
    # Available values: big | small
    size: big
    sidebar: true
    post: false
    # You can set a language value if you prefer a translated version of CC license, e.g. deed.zh
    # CC licenses are available in 39 languages, you can find the specific and correct abbreviation you need on https://creativecommons.org
    language: 

  # 是否允许打开图片
  open_graph:
    enable: false 


  # ---------------------------------------------------------------
  # Menu Settings
  # ---------------------------------------------------------------
  
  # 菜单选项
  menu:
    所有文章: / || fa fa-home
    编程代码: /1-code.html || fa fa-code
    人工智能: /2-AI.html || fa fa-robot
    生物信息: /3-bioinformatics.html || fa fa-dna
    其他: /4-others.html || fa fa-bars

    # tags: /tags/ || fa fa-tags
    # categories: /categories/ || fa fa-th
    # archives: /archives/ || fa fa-archive
    #schedule: /schedule/ || fa fa-calendar
    #sitemap: /sitemap.xml || fa fa-sitemap
    #commonweal: /404/ || fa fa-heartbeat
  
  
  # ---------------------------------------------------------------
  # Sidebar Settings
  # See: https://theme-next.js.org/docs/theme-settings/sidebar
  # ---------------------------------------------------------------
  
  sidebar:
    # Sidebar Position.
    position: left
    #position: right

    # Manual define the sidebar width. If commented, will be default for:
    # Muse | Mist: 320
    # Pisces | Gemini: 240
    #width: 300

    # Sidebar Display (only for Muse | Mist), available values:
    #  - post    expand on posts automatically. Default.
    #  - always  expand for all pages automatically.
    #  - hide    expand only when click on the sidebar toggle icon.
    #  - remove  totally remove sidebar including sidebar toggle.
    display: post

  # Sidebar padding in pixels.
  padding: 18
  # Sidebar offset from top menubar in pixels (only for Pisces | Gemini).
  offset: 12
  # 边栏头像
  avatar:
    # Replace the default image and set the url here.
    url: /images/avatar/4d-boy.webp
    # If true, the avatar will be dispalyed in circle.
    rounded: false
    # If true, the avatar will be rotated with the cursor.
    rotated: false

  # 社交
  social:
    # GitHub: https://github.com/Passion4ever || fab fa-github
    # Scholar: https://scholar.google.com/citations?user=nM1ql0cAAAAJ || fab fa-google
    # E-Mail: mailto:yourname@gmail.com || fa fa-envelope
  
  social_icons:
    enable: true
    icons_only: false
    transition: false
  

  # ---------------------------------------------------------------
  # Footer Settings
  # See: https://theme-next.js.org/docs/theme-settings/footer
  # ---------------------------------------------------------------

  # language_switcher: true
  # 脚注
  footer:
    since: 2020
    copyright: Passion4ever
    powered: false


  # ---------------------------------------------------------------
  # Post Settings
  # See: https://theme-next.js.org/docs/theme-settings/posts
  # ---------------------------------------------------------------

  # 标签使用图标而不是 `#`
  tag_icon: true


  # ---------------------------------------------------------------
  # Custom Page Settings
  # See: https://theme-next.js.org/docs/theme-settings/custom-pages
  # ---------------------------------------------------------------



  # ---------------------------------------------------------------
  # Misc Theme Settings
  # See: https://theme-next.js.org/docs/theme-settings/miscellaneous
  # ---------------------------------------------------------------
  
  # 代码块
  codeblock:
    # Code Highlight theme
    # All available themes: https://theme-next.js.org/highlight/
    theme:
      light: atom-one-dark-reasonable
      dark: atom-one-dark-reasonable
    # prism:
    #   light: prism
    #   dark: prism-dark
    # Add copy button on codeblock
    copy_button:  
      enable: true
      # Available values: default | flat | mac
      style: mac
    fold:
      enable: true
      height: 500

  # 返回顶部
  back2top:
    enable: true
    # Back to top in sidebar.
    sidebar: true
    # Scroll percent label in b2t button.
    scrollpercent: true
  
  # 阅读进度条
  reading_progress:
    enable: true
    # Available values: left | right
    start_at: left
    # Available values: top | bottom
    position: bottom
    reversed: false
    # color: "#37c6c0"
    color: "#9f9f9f"
    height: 5px


  # ---------------------------------------------------------------
  # Font Settings
  # ---------------------------------------------------------------
  # Find fonts on Google Fonts (https://fonts.google.com)
  # All fonts set here will have the following styles:
  #   light | light italic | normal | normal italic | bold | bold italic
  # Be aware that setting too much fonts will cause site running slowly
  # ---------------------------------------------------------------
  # Web Safe fonts are recommended for `global` (and `title`):
  # Arial | Tahoma | Helvetica | Times New Roman | Courier New | Verdana | Georgia | Palatino | Garamond | Comic Sans MS | Trebuchet MS
  # ---------------------------------------------------------------
  font:
    enable: false

    # Uri of fonts host, e.g. https://fonts.googleapis.com (Default).
    host:

    # Font options:
    # `external: true` will load this font family from `host` above.
    # `family: Times New Roman`. Without any quotes.
    # `size: x.x`. Use `em` as unit. Default: 1 (16px)

    # Global font settings used for all elements inside <body>.
    global:
      external: false
      family: Lato
      size: 1

    # Font settings for site title (.site-title).
    title:
      external: true
      family:
      size: 

    # Font settings for headlines (<h1> to <h6>).
    headings:
      external: true
      family:
      size: 

    # Font settings for posts (.post-body).
    posts:
      external: true
      family:

    # Font settings for <code> and code blocks.
    codes:
      external: true
      family:


  # ---------------------------------------------------------------
  # Tags Settings
  # See: https://theme-next.js.org/docs/tag-plugins/
  # ---------------------------------------------------------------
  
  # 注释块的风格
  note:
    # Note tag style values:
    #  - simple    bootstrap callout old alert style. Default.
    #  - modern    bootstrap callout new (v2-v3) alert style.
    #  - flat      flat callout style with background, like on Mozilla or StackOverflow.
    #  - disabled  disable all CSS styles import of note tag.
    style: flat
    icons: true
    # Offset lighter of background in % for modern and flat styles (modern: -12 | 12; flat: -18 | 6).
    # Offset also applied to label tag variables. This option can work with disabled note tag.
    light_bg_offset: 0

  # ---------------------------------------------------------------
  # Third Party Plugins & Services Settings
  # See: https://theme-next.js.org/docs/third-party-services/
  # More plugins: https://github.com/next-theme/awesome-next
  # ---------------------------------------------------------------

  # ---------------------------------------------------------------
  # Math Formulas Render Support
  # See: https://theme-next.js.org/docs/third-party-services/math-equations
  # Warning: Please install / uninstall the relevant renderer according to the documentation.
  # Server-side plugin: https://github.com/next-theme/hexo-filter-mathjax
  # ---------------------------------------------------------------


  # 数学公式, 这里还要卸载原插件安装新的插件
  math:
    # Default (false) will load mathjax / katex script on demand.
    # That is it only render those page which has `mathjax: true` in front-matter.
    # If you set it to true, it will load mathjax / katex script EVERY PAGE.
    every_page: true

    mathjax:
      enable: false
      # Available values: none | ams | all
      tags: none
      # See: https://mhchem.github.io/MathJax-mhchem/
      mhchem: false

    katex:
      enable: true
      # See: https://github.com/KaTeX/KaTeX/tree/master/contrib/copy-tex
      copy_tex: true
      strict: false
  
  # ---------------------------------------------------------------
  # External Libraries
  # See: https://theme-next.js.org/docs/third-party-services/external-libraries
  # ---------------------------------------------------------------
  
  # Easily enable fast Ajax navigation on your website.
  # pjax: false
  lazyload: true


  pace:
    enable: true
    color: blue
    theme: flash


  # ---------------------------------------------------------------
  # Animation Settings
  # ---------------------------------------------------------------
  
  motion:
    enable: false
  
  # ---------------------------------------------------------------
  # Search Services
  # See: https://theme-next.js.org/docs/third-party-services/search-services
  # ---------------------------------------------------------------

  # 开启 next 的本地搜索
  local_search:
    enable: true

  # ---------------------------------------------------------------
  # CDN Settings
  # See: https://theme-next.js.org/docs/advanced-settings/vendors
  # ---------------------------------------------------------------

  vendors:
    # The CDN provider of NexT internal scripts.
    # Available values: local | jsdelivr | unpkg | cdnjs | custom
    # Warning: If you are using the latest master branch of NexT, please set `internal: local`
    internal: local
    # The default CDN provider of third-party plugins.
    # Available values: local | jsdelivr | unpkg | cdnjs | custom
    # Dependencies for `plugins: local`: https://github.com/next-theme/plugins
    plugins: cdnjs
    # Custom CDN URL
    # For example:
    # custom_cdn_url: https://cdn.jsdelivr.net/npm/${npm_name}@${version}/${minified}
    # custom_cdn_url: https://cdnjs.cloudflare.com/ajax/libs/${cdnjs_name}/${version}/${cdnjs_file}
    custom_cdn_url:

    lazyload: //cdn.jsdelivr.net/npm/lozad@1/dist/lozad.min.js
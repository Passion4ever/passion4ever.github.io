# 站点设置
# 指南：https://docs.hugoblox.com/tutorial/
# 文档：https://docs.hugoblox.com/
# 该文件采用YAML语法格式编写 - 了解更多请访问 https://learnxinyminutes.com/docs/yaml/

# 外观
appearance:
  mode: system
  color: emerald

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'The highly-customizable Hugo Academic theme powered by Hugo Blox Builder. Easily create your personal academic website.'
    twitter: 'GetResearchDev'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# 站点标题头
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: "Passion4ever"

# 站点页脚
footer:
  copyright:
    notice: '© {year} Passion4ever. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# 本地化
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# 站点功能
features:
  math:
    enable: true
  privacy_pack:
    enable: false
